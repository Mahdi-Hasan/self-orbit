syntax = "proto3";

package selforbit.common;

option csharp_namespace = "SelfOrbit.Contracts.Grpc.Common";

// Shared timestamp representation
message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

// Confidence level for AI predictions
enum ConfidenceLevel {
  CONFIDENCE_UNSPECIFIED = 0;
  LOW = 1;
  MEDIUM = 2;
  HIGH = 3;
}

// Standard error metadata
message ErrorDetail {
  string code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

// Processing status
enum ProcessingStatus {
  PROCESSING_STATUS_UNSPECIFIED = 0;
  SUCCESS = 1;
  PARTIAL = 2;
  FAILED = 3;
}

// Money representation
message Money {
  double amount = 1;
  string currency = 2;
}
