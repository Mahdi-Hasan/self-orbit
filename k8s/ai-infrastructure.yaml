---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-infrastructure
  namespace: self-orbit
  labels:
    app: ai-infrastructure
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-infrastructure
  template:
    metadata:
      labels:
        app: ai-infrastructure
    spec:
      containers:
        - name: ai-infrastructure
          image: selforbit/ai-infrastructure:latest
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 50051
              name: grpc
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-infrastructure
  namespace: self-orbit
spec:
  selector:
    app: ai-infrastructure
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 50051
      targetPort: 50051
  type: ClusterIP
